<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>들어줄게</title>
    <script>
      // Unity보다 먼저 등록 — input/textarea 포커스 중엔 키보드 이벤트가 Unity에 닿지 않도록 차단
      (function () {
        function blockForInput(e) {
          var tag = document.activeElement && document.activeElement.tagName;
          if (tag === 'INPUT' || tag === 'TEXTAREA') {
            e.stopImmediatePropagation();
          }
        }
        document.addEventListener('keydown',  blockForInput, true);
        document.addEventListener('keyup',    blockForInput, true);
        document.addEventListener('keypress', blockForInput, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
